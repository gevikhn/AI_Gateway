listen: 0.0.0.0:443
gateway_auth:
  token_sources:
  - type: authorization_bearer
  - type: header
    name: x-gw-token
  - type: header
    name: x-api-key
routes:
- id: deepseek
  prefix: /ds
  upstream:
    base_url: https://api.deepseek.com
    strip_prefix: true
    connect_timeout_ms: 10000
    request_timeout_ms: 300000
    inject_headers:
    - name: Authorization
      value: Bearer ${DEEPSEEK_API_KEY}
    remove_headers:
    - Authorization
    - X-Forwarded-For
    - Forwarded
    - Cf-Connecting-Ip
    - True-Client-Ip
    upstream_key_max_inflight: 4
- id: kimi
  prefix: /kimi
  upstream:
    base_url: https://api.kimi.com/coding/v1
    strip_prefix: true
    connect_timeout_ms: 10000
    request_timeout_ms: 300000
    inject_headers:
    - name: x-api-key
      value: ${KIMI_API_KEY}
    remove_headers:
    - Authorization
    - X-Forwarded-For
    - Forwarded
    - Cf-Connecting-Ip
    - True-Client-Ip
    - x-api-key
    upstream_key_max_inflight: 10
    user_agent: claude-cli/2.1.63 (external, cli)
api_keys:
  keys:
  - id: key_1772505243012
    route_ids:
    - kimi
    key: ${GW_APIKEY_KIMI}
    enabled: true
    rate_limit:
      per_minute: 12
    ban_status:
      is_banned: false
      banned_at: null
      banned_until: null
      triggered_rule_id: null
      reason: null
      ban_count: 0
  - id: key_1772526760247
    route_ids:
    - deepseek
    key: ${GW_APIKEY_DS}
    enabled: true
    rate_limit:
      per_minute: 600
    ban_status:
      is_banned: false
      banned_at: null
      banned_until: null
      triggered_rule_id: null
      reason: null
      ban_count: 0
  ban_rules:
  - id: rule_1772507643678
    name: 限流
    condition:
      type: request_count
      window_secs: 60
      max_requests: 120
    ban_duration_secs: 600
    enabled: true
    trigger_count_threshold: 3
    trigger_window_secs: 3600
  sqlite:
    path: /home/admin/ai_gw/data/banlog.db
inbound_tls:
  self_signed_cert_path: /etc/ai_gw_lite/certs/gateway.ciallo.fans.crt
  self_signed_key_path: /etc/ai_gw_lite/certs/gateway.ciallo.fans.key
cors:
  enabled: true
  allow_origins:
  - https://fy.ciallo.fans
  allow_headers:
  - authorization
  - content-type
  - x-gw-token
  allow_methods:
  - GET
  - POST
  - OPTIONS
  - PUT
  - DELETE
rate_limit:
  per_minute: 120
observability:
  logging:
    level: info
    format: json
    to_stdout: true
    file:
      enabled: true
      dir: /var/log/ai_gw
      prefix: ai-gw-lite
      rotation: daily
      max_files: 7
  metrics:
    enabled: true
    path: /metrics
    token: ${METRICS_TOKEN}
    sqlite:
      path: /home/admin/ai_gw/data/metrics.db
      flush_interval_secs: 60
      batch_size: 10
      retention_days: 30
  tracing:
    enabled: true
    sample_ratio: 0.05
admin:
  enabled: true
  token: ${ADMIN_TOKEN}
  path_prefix: /admin
