listen: 0.0.0.0:443
gateway_auth:
  token_sources:
  - type: authorization_bearer
  - type: header
    name: x-gw-token
  - type: header
    name: x-api-key
data_dir: "./data"
sqlite:
  path: ./data/banlog.db
inbound_tls:
  self_signed_cert_path: ./certs/gateway.ciallo.fans.crt
  self_signed_key_path: ./certs/gateway.ciallo.fans.key
cors:
  enabled: true
  allow_origins:
  - https://fy.ciallo.fans
  allow_headers:
  - authorization
  - content-type
  - x-gw-token
  allow_methods:
  - GET
  - POST
  - OPTIONS
  - PUT
  - DELETE
rate_limit:
  per_minute: 120
observability:
  logging:
    level: info
    format: json