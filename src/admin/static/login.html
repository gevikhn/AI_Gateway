<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>登录 - AI Gateway Admin</title>
  <link rel="icon" type="image/svg+xml" href="{{ADMIN_PREFIX}}/favicon.ico">
  <style>{{CSS}}</style>
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h1 class="login-title">AI Gateway Admin</h1>
          <p class="login-subtitle">请输入 Admin Token 以继续</p>
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
          <div class="login-field">
            <label class="login-label" for="token">Admin Token</label>
            <input
              id="token"
              class="login-input"
              type="password"
              placeholder="输入您的访问令牌"
              autocomplete="off"
              required
            />
            <p class="login-hint">Token 将被保存在浏览器本地存储中</p>
          </div>

          <button type="submit" class="login-btn" id="loginBtn">
            <span class="login-btn-text">进入管理后台</span>
            <svg class="login-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </form>

        <div class="login-error" id="loginError"></div>
      </div>

      <p class="login-footer">
        AI Gateway Admin UI · 安全访问
      </p>

      <!-- 主题切换 -->
      <div class="login-theme-toggle" title="主题设置">
        <button class="theme-toggle-btn" data-theme-value="light" onclick="setTheme('light')" title="亮色模式">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="theme-toggle-btn" data-theme-value="dark" onclick="setTheme('dark')" title="暗色模式">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="theme-toggle-btn" data-theme-value="auto" onclick="setTheme('auto')" title="跟随系统">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    window.CONFIG = {
      apiUrl: '{{API_CONFIG_URL}}',
      saveUrl: '{{API_SAVE_URL}}',
      adminPrefix: '{{ADMIN_PREFIX}}'
    };
  </script>
  <script>{{JS}}</script>
</body>
</html>
