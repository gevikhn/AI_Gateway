<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AI Gateway Admin</title>
  <link rel="icon" type="image/svg+xml" href="{{ADMIN_PREFIX}}/favicon.ico">
  <style>{{CSS}}</style>
</head>
<body>
  <div class="admin-layout">
    <!-- 顶部导航栏（包含 Tabs 和用户信息） -->
    <header class="admin-header">
      <div class="admin-header-brand">
        <svg class="admin-logo" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span class="admin-title">AI Gateway</span>
      </div>

      <nav class="admin-tabs" id="tabNav"></nav>

      <div class="admin-actions" id="actionBar" style="display:none;">
        <button class="admin-icon-btn" onclick="saveConfig()" title="保存到文件">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
          </svg>
        </button>
        <button class="admin-icon-btn admin-icon-btn-primary" onclick="applyConfig()" title="应用配置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>

      <div class="admin-user">
        <span class="admin-user-status">
          <span class="status-dot"></span>
          <span id="saveStatus"></span>
        </span>
        <button class="admin-logout-btn" onclick="logout()" title="退出登录">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="admin-main">
      <div id="tabPanels"></div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    window.CONFIG = {
      apiUrl: '{{API_CONFIG_URL}}',
      saveUrl: '{{API_SAVE_URL}}',
      metricsUrl: '{{API_METRICS_URL}}',
      keysUrl: '{{API_KEYS_URL}}',
      adminPrefix: '{{ADMIN_PREFIX}}'
    };
  </script>
  <script>{{JS}}</script>
</body>
</html>
